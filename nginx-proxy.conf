# Instructions for Native NGINX Configuration on Frontend VM
# File location on your VM: typically /etc/nginx/sites-available/default

server {
    listen 80;
    listen [::]:80;
    server_name _; # Or your domain name

    # 1. Route to Frontend Docker Container
    location / {
        # Assuming you spun up the frontend container with:
        # docker run -d -p 3000:3000 my-frontend-image
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Proxy API requests across the VPC to the Private Backend VM
    location /api/ {
        # REPLACE 10.0.X.X with the actual Private IP of your Backend VM
        # 5000 is the port exposed by api-gateway
        proxy_pass http://10.0.X.X:5000/;
        
        # Security and forwarding headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
